name: Dounai Daily Check-in

on:
  schedule:
    # 每天 0:20 (UTC+8)，即 UTC 16:20
    - cron: "20 16 * * *"
    # 每天 9:20 (UTC+8)，即 UTC 1:20
    - cron: "20 1 * * *"
  workflow_dispatch:
    # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run check-in
        id: checkin
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: node src/cli.js start

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Dounai Check-in] 打卡失败通知"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            豆奶签到自动打卡执行失败，请检查。

            失败时间：${{ github.event.repository.updated_at }}

            详细信息请查看 Actions 日志：
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
