name: Dounai Daily Check-in

on:
  schedule:
    # 每天 0:20 (UTC+8)，即 UTC 16:20
    - cron: "20 16 * * *"
    # 每天 9:20 (UTC+8)，即 UTC 1:20
    - cron: "20 1 * * *"
  workflow_dispatch:
    # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run check-in
        id: checkin
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: node src/cli.js start

      - name: Send QQ official bot notification
        if: always()
        env:
          QQ_BOT_APP_ID: ${{ secrets.QQ_BOT_APP_ID }}
          QQ_BOT_CLIENT_SECRET: ${{ secrets.QQ_BOT_CLIENT_SECRET }}
          QQ_BOT_TARGET_ID: ${{ secrets.QQ_BOT_TARGET_ID }}
          QQ_BOT_TARGET_TYPE: ${{ secrets.QQ_BOT_TARGET_TYPE }}
        run: |
          STATUS="${{ job.status }}"
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          if [ "$STATUS" = "success" ]; then
            MSG="✅ 豆奶签到成功\n时间：${NOW}"
          else
            MSG="❌ 豆奶签到失败\n时间：${NOW}\n详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          # 获取 access_token
          TOKEN_RESP=$(curl -s -X POST "https://bots.qq.com/app/getAppAccessToken" \
            -H "Content-Type: application/json" \
            -d "{\"appId\":\"${QQ_BOT_APP_ID}\",\"clientSecret\":\"${QQ_BOT_CLIENT_SECRET}\"}")

          ACCESS_TOKEN=$(echo "$TOKEN_RESP" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access_token: $TOKEN_RESP"
            exit 1
          fi

          # 发送消息
          TARGET_TYPE="${QQ_BOT_TARGET_TYPE:-user}"
          if [ "$TARGET_TYPE" = "group" ]; then
            URL="https://api.sgroup.qq.com/v2/groups/${QQ_BOT_TARGET_ID}/messages"
          else
            URL="https://api.sgroup.qq.com/v2/users/${QQ_BOT_TARGET_ID}/messages"
          fi

          SEND_RESP=$(curl -s -X POST "$URL" \
            -H "Authorization: QQBot ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"${MSG}\",\"msg_type\":0}")

          echo "Send response: $SEND_RESP"
