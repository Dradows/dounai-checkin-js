name: Dounai Daily Check-in

on:
  schedule:
    # 每天 0:20 (UTC+8)，即 UTC 16:20
    - cron: "20 16 * * *"
    # 每天 9:20 (UTC+8)，即 UTC 1:20
    - cron: "20 1 * * *"
  workflow_dispatch:
    # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run check-in
        id: checkin
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          node src/cli.js start > checkin-output.txt 2>&1
          EXIT_CODE=$?
          cat checkin-output.txt
          exit $EXIT_CODE

      - name: Send DingTalk notification
        if: always()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "=== DEBUG: file check ==="
          ls -la checkin-output.txt
          echo "=== DEBUG: file content (hex first 100 bytes) ==="
          xxd checkin-output.txt | head -5
          echo "=== DEBUG: file content (text) ==="
          cat -A checkin-output.txt | head -20
          echo "=== DEBUG: job status ==="
          echo "${{ job.status }}"

          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const https = require('https');

          const webhook = process.env.DINGTALK_WEBHOOK;
          const secret = process.env.DINGTALK_SECRET;
          const status = process.env.JOB_STATUS;
          const now = new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});
          const repo = '${{ github.repository }}';
          const runId = '${{ github.run_id }}';

          const raw = fs.readFileSync('checkin-output.txt', 'utf8');
          console.log('=== DEBUG: raw length =', raw.length);
          console.log('=== DEBUG: raw content =', JSON.stringify(raw.slice(0, 500)));

          const output = raw.trim().slice(0, 2000);
          console.log('=== DEBUG: trimmed length =', output.length);
          console.log('=== DEBUG: trimmed content =', JSON.stringify(output));

          const isSuccess = status === 'success';

          const title = isSuccess ? '✅ 豆奶签到成功' : '❌ 豆奶签到失败';
          let text = isSuccess
            ? '## ✅ 豆奶签到成功\n\n- 时间：' + now + '\n\n### 返回内容\n\n\`\`\`\n' + output + '\n\`\`\`'
            : '## ❌ 豆奶签到失败\n\n- 时间：' + now + '\n\n### 返回内容\n\n\`\`\`\n' + output + '\n\`\`\`\n\n- [查看日志](https://github.com/' + repo + '/actions/runs/' + runId + ')';

          console.log('=== DEBUG: markdown text length =', text.length);
          console.log('=== DEBUG: markdown text preview =', text.slice(0, 300));

          const ts = Date.now().toString();
          const sign = encodeURIComponent(
            crypto.createHmac('sha256', secret).update(ts + '\n' + secret).digest('base64')
          );

          const body = JSON.stringify({ msgtype: 'markdown', markdown: { title, text } });
          console.log('=== DEBUG: request body length =', body.length);
          console.log('=== DEBUG: request body preview =', body.slice(0, 500));

          const url = new URL(webhook);
          url.searchParams.set('timestamp', ts);
          url.searchParams.set('sign', sign);
          console.log('=== DEBUG: request URL (masked) =', url.origin + url.pathname + '?...');

          const req = https.request(url, { method: 'POST', headers: { 'Content-Type': 'application/json' } }, (res) => {
            let data = '';
            res.on('data', (c) => data += c);
            res.on('end', () => console.log('DingTalk response:', data));
          });
          req.on('error', (e) => console.error('DingTalk request error:', e));
          req.write(body);
          req.end();
          "
          "
