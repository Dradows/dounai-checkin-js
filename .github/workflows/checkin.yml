name: Dounai Daily Check-in

on:
  schedule:
    # 每天 0:20 (UTC+8)，即 UTC 16:20
    - cron: "20 16 * * *"
    # 每天 9:20 (UTC+8)，即 UTC 1:20
    - cron: "20 1 * * *"
  workflow_dispatch:
    # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run check-in
        id: checkin
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: node src/cli.js start

      - name: Send DingTalk notification
        if: always()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          STATUS="${{ job.status }}"
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          if [ "$STATUS" = "success" ]; then
            TITLE="✅ 豆奶签到成功"
            TEXT="## ✅ 豆奶签到成功\n\n- 时间：${NOW}"
          else
            TITLE="❌ 豆奶签到失败"
            TEXT="## ❌ 豆奶签到失败\n\n- 时间：${NOW}\n- [查看日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

          # 计算加签参数
          SIGN_PARAMS=$(node -e "
            const crypto = require('crypto');
            const ts = Date.now().toString();
            const secret = process.env.DINGTALK_SECRET;
            const sign = encodeURIComponent(
              crypto.createHmac('sha256', secret)
                .update(ts + '\n' + secret)
                .digest('base64')
            );
            console.log('&timestamp=' + ts + '&sign=' + sign);
          ")

          curl -s -X POST "${DINGTALK_WEBHOOK}${SIGN_PARAMS}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"${TITLE}\",\"text\":\"${TEXT}\"}}"
