name: Dounai Daily Check-in

on:
  schedule:
    # 每天 0:20 (UTC+8)，即 UTC 16:20
    - cron: "20 16 * * *"
    # 每天 9:20 (UTC+8)，即 UTC 1:20
    - cron: "20 1 * * *"
  workflow_dispatch:
    # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run check-in
        id: checkin
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: node src/cli.js start

      - name: Send QQ notification
        if: always()
        env:
          QMSG_KEY: ${{ secrets.QMSG_KEY }}
          QMSG_QQ: ${{ secrets.QMSG_QQ }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ 豆奶签到成功%0A时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          else
            MSG="❌ 豆奶签到失败%0A时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')%0A详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "https://qmsg.zendee.cn/api/v2/send/${QMSG_KEY}" \
            -d "msg=${MSG}" \
            -d "qq=${QMSG_QQ}"
